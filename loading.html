<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting... | Jaymier</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --primary: #00d2ff;
        }

        body {
            margin: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .loader-container {
            text-align: center;
            animation: fadeIn 1s ease-in forwards;
        }

        .logo-large {
            font-size: 5rem;
            font-weight: 900;
            color: white;
            letter-spacing: 10px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            text-shadow: 0 0 20px var(--primary);
        }

        .logo-large span {
            color: var(--primary);
        }

        /* Extraordinary Scanning Effect */
        .logo-large::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 210, 255, 0.4), transparent);
            animation: scan 2s infinite ease-in-out;
        }

        .status-text {
            margin-top: 20px;
            color: var(--primary);
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes scan {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Exit animation triggered by JS */
        .fade-out {
            animation: fadeOut 0.8s forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; background: #000; }
        }
    </style>
</head>
<body>

    <div class="loader-container" id="loader">
        <div class="logo-large">JAYMIER<span>.</span></div>
        <p class="status-text">Initializing Computational Grid...</p>
    </div>

    <script>
        // Set the destination URL here
        const destination = "jaymier.html"; // Or wherever you want the logo to lead

        window.onload = () => {
            setTimeout(() => {
                document.body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = destination;
                }, 800);
            }, 2500); // 2.5 seconds of spectacular animation
        };
    </script>
</body>
</html>
